<!doctype html>
<html>
  <head>
    <title>UCCIS Advanced</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <h1>🌆 UCCIS Smart Dashboard</h1>

    <div class="controls">
      <button onclick="setMode('real')">Real</button>
      <button onclick="setMode('synthetic')">Synthetic</button>
    </div>

    <div class="grid">
      <div class="card">
        <h2>🗺️ Map</h2>
        <div id="map"></div>
      </div>

      <div class="card">
        <h2>📊 Zone Analytics</h2>
        <canvas id="chart"></canvas>
      </div>

      <div class="card">
        <h2>🚨 Alerts</h2>
        <div id="alerts"></div>
      </div>

      <div class="card">
        <h2>⚡ Actions</h2>
        <select id="zoneSelect"></select>
        <button onclick="triggerAction('Waste')">Waste</button>
        <button onclick="triggerAction('Water')">Water</button>
        <button onclick="triggerAction('Emergency')">Emergency</button>
      </div>
    </div>

    <h2>🔁 Pipeline</h2>
    <div class="pipeline">
      Input → Intelligence → Prediction → Alert → Action → Output
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/script.js"></script>
  </body>
</html>
